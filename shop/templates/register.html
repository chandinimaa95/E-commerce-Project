{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <link rel="stylesheet" href="{%static 'css/style.css' %}">
    <style>
        
        form{
             border-radius: 10px;
             padding: 70px;
             border-width: 2px;
             width: 300px;
             background-color: white;
             margin: 100px auto;
             text-align: center;
             box-shadow: 0px 2px 10px gray;
        }
         input{
            height: 30px;
        }
    </style>
</head>
<body>
    <nav>
        <h1>Amazon</h1>
        <a href="/">Home</a>
        <a href="/cart/">Cart</a>
        <a href="/login">Login</a>
    </nav>
<div >
<form method="POST">
    {% csrf_token %}
    <h1>Register</h1>

    <input type="text" name="username" placeholder="Username">
    <br><br>

    <input type="password" name="password" placeholder="Password">
    <br><br>

    <button type="submit">
        Register
    </button>

</form>
</div>
</body>
</html>
